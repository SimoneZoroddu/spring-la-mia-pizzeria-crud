<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza</title>
    <th:block th:replace="~{fragments/links :: linksHead}"></th:block>
</head>

<body>
    <div th:replace="~{fragments/navbar :: headerNavbar}"></div>





    <div class="container">
        <h1>Crea una nuova pizza</h1>
        <div class="row">
            <div class="col">

                <form th:action="@{/pizzas/create}" method="post" id="pizza-form" th:object="${pizza}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome della Pizza</label>
                        <input type="text" id="name" class="form-control" th:field="*{name}" th:errorClass="is-invalid"
                            maxlength="100">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                            <ul>
                                <li th:each="error : ${#fields.errors('name')}" th:text="${error}"></li>
                            </ul>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="url" class="form-label">URL</label>
                        <input type="url" id="url" class="form-control" th:field="*{url}" th:errorClass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('url')}">
                            <ul>
                                <li th:each="error : ${#fields.errors('url')}" th:text="${error}"></li>
                            </ul>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Ingredienti</label>
                        <textarea id="description" class="form-control" th:field="*{description}"
                            th:errorClass="is-invalid" maxlength="500"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}">
                            <ul>
                                <li th:each="error : ${#fields.errors('description')}" th:text="${error}"></li>
                            </ul>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Prezzo</label>
                        <input type="number" id="price" class="form-control" min="0" step="0.01" th:field="*{price}"
                            th:errorClass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}">
                            <ul>
                                <li th:each="error : ${#fields.errors('price')}" th:text="${error}"></li>
                            </ul>
                        </div>
                    </div>
                    <div class="mb-3 d-flex justify-content-between">
                        <input type="submit" value="Create new pizza" class="btn btn-primary">
                        <input type="reset" value="reset all input" class="btn btn-warning">
                    </div>
                </form>
            </div>
        </div>

    </div>








    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>
