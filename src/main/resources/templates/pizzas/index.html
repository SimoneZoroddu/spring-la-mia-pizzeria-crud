<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzas</title>
    <th:block th:replace="~{fragments/links :: linksHead}"></th:block>
</head>

<body>
    <div th:replace="~{fragments/navbar :: headerNavbar}"></div>



    <div class="container">
        <h1 class="text-center">Pizzas</h1>
        <a th:href="@{pizzas/create}">Crea una nuova pizza</a>
        <form action="/pizzas" method="get">
            <input type="text" name="keyword" placeholder="Cerca pizza...">
            <button type="submit">Cerca</button>
        </form>
        <div class="row row-cols-4" th:if="${pizzas.size() > 0}">
            <div class="col my-2" th:each="pizza : ${pizzas}" th:object="${pizza}">
                <div class="card" style="width: 18rem;">
                    <img th:src="*{url}" class="card-img-top" th:alt="*{name}">
                    <div class="card-body">
                        <h4 class="card-title">[[*{name}]]</h4>
                        <h5>[[*{price}]] €</h5>
                        <p class="card-text">Ingredienti: [[*{description}]]</p>
                    </div>
                    <a th:href="@{/pizzas/{idPizzas}(idPizzas=*{id})}" class="btn btn-primary">Vedi Dettagli</a>
                    <a th:href="@{/pizzas/edit/{idPizzas}(idPizzas=*{id})}" class="btn btn-warning">Modifica Pizza</a>
                    <!-- Button trigger modal -->
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                        th:data-bs-target="'#modal-' + *{id}">
                        Delete Pizza
                    </button>

                    <!-- Modal -->
                    <div class="modal fade" th:id="'modal-' + *{id}" tabindex="-1" aria-hidden="true" th:aria-labelledby="'modalLabel-' + *{id}">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h1 class="modal-title fs-5" th:id="'modal-' + *{id}">Vuoi Eliminare tale pizza?</h1>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    Sei sicuro di voler distruggere [[*{name}]]
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                        Close
                                    </button>
                                    <form th:action="@{/pizzas/delete/{id}(id=*{id})}" method="post">
                                        <button type="submit" class="btn btn-danger">
                                            Distruggi la pizza
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <p th:unless="${pizzas.size() > 0}">Non ci sono pizze presenti</p>
    </div>







    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
